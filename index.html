<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="estilo.css">
    
</head>
<body>
    <main id="container">
       
        <section id="calculator">
            <form  id="form">
                <h1 class="d">C a l i x t o</h1>
                <h1 class="d" id="title">
                    Calculo - IMC 
                </h1>
                <div class="input-box">
                    <label for="weigth">Peso em KG.</label>
                    <div class="input-field"><input type="number" id="weigth" required>
                        <span class='pa'> KG. </span>
                    </div>
                </div>

                <div class="input-box">
                    <label for="heigth">Altura em Mts.</label>
                    <div class="input-field"><input type ="number" step='0.01' id="heigth" required>
                        <span class="pa"> Mts. </span>
                    </div>
                </div>
              
                <button id="calculate">Calcular</button>
           
            </form>
           
            <div id="infos" class="hidden">
                <div id="result">
                    <div id="bmi">
                        <span>O seu IMC é:</span>
                        <span class="b" id="value"></span>
                        
                    </div>
                    <div id="description">
                        <span></span>
                    </div>
                </div>
                
                <div id="more_info" >
                    <a href="https://mundoeducacao.uol.com.br/saude-bem-estar/imc.htm" target="_blank">Clique aqui! Para mais informações sobre o IMC.</a>
                </div>

            </div>
        </section>
    </main>
    
      <script src="script.js"></script>
    
</body>
</html>
